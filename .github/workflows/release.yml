name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  gate:
    name: Release gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      channel: ${{ steps.release_kind.outputs.channel }}
      release_flag: ${{ steps.release_kind.outputs.release_flag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: .agents/skills/argus/package-lock.json

      - name: Install skill dependencies
        working-directory: .agents/skills/argus
        run: npm ci

      - name: Classify release tag
        id: release_kind
        run: node scripts/classify-release-tag.mjs "${GITHUB_REF_NAME}"

      - name: Run release gate
        run: >-
          npm run release:gate --
          --channel "${{ steps.release_kind.outputs.channel }}"
          --tag "${GITHUB_REF_NAME}"

  release:
    name: Build from fresh checkout and publish
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Fresh checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Rebuild generated distributions
        run: npm run rebuild

      - name: Verify generated distributions are committed
        run: node scripts/check-generated-clean.mjs

      - name: Build Arkclaw package
        run: npm run build:arkclaw

      - name: Verify Arkclaw ZIP
        run: unzip -tq dist/arkclaw/argus.zip

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_FLAG: ${{ needs.gate.outputs.release_flag }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          "dist/arkclaw/argus.zip#argus.zip"
          --verify-tag --generate-notes "${RELEASE_FLAG}"
