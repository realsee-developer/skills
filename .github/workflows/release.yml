name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: .agents/skills/argus/package-lock.json

      - name: Install skill dependencies
        working-directory: .agents/skills/argus
        run: npm ci

      - name: Run stable release gate
        run: npm run release:gate -- --channel stable --tag "${GITHUB_REF_NAME}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes --latest
