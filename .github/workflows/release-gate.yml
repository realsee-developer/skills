name: Release Gate

on:
  push:
    branches:
      - main
      - test/**
      - stable/**
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to validate
        required: true
        default: stable
        type: choice
        options:
          - preview
          - stable
      tag:
        description: Release tag to validate
        required: true
        default: v2.0.0
        type: string

permissions:
  contents: read

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: .agents/skills/argus/package-lock.json

      - name: Install skill dependencies
        working-directory: .agents/skills/argus
        run: npm ci

      - name: Run release gate
        env:
          RELEASE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || '' }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
        run: |
          if [ -z "$RELEASE_CHANNEL" ]; then
            RELEASE_METADATA_CHANNEL="$(node -p "JSON.parse(require('node:fs').readFileSync('release-channel.json')).channel")"
            case "$RELEASE_METADATA_CHANNEL" in
              stable) RELEASE_CHANNEL=stable ;;
              development) RELEASE_CHANNEL=preview ;;
              *) echo "Unsupported release metadata channel: $RELEASE_METADATA_CHANNEL" >&2; exit 1 ;;
            esac
          fi
          if [ -z "$RELEASE_TAG" ]; then
            if [ "$RELEASE_CHANNEL" = "stable" ]; then
              RELEASE_TAG="$(node -p "'v' + JSON.parse(require('node:fs').readFileSync('release-channel.json')).version")"
            else
              RELEASE_TAG="$(node -p "JSON.parse(require('node:fs').readFileSync('release-channel.json')).skills.argus.next_release_candidate")"
            fi
          fi
          npm run release:gate -- --channel "$RELEASE_CHANNEL" --tag "$RELEASE_TAG"
