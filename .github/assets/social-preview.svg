<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">Realsee Skills — Argus</title>
  <desc id="description">A world-leading 3D vision foundation model packaged as an agent-ready Argus Skill workflow.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#f7faff"/>
      <stop offset="1" stop-color="#e8f5ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11bdf4"/>
      <stop offset="0.54" stop-color="#1677ff"/>
      <stop offset="1" stop-color="#2258e8"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#1677ff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0e58b8" flood-opacity="0.16"/>
    </filter>
    <clipPath id="researchClip">
      <rect x="704" y="104" width="500" height="175" rx="16"/>
    </clipPath>
    <clipPath id="workflowClip">
      <rect x="704" y="320" width="500" height="134" rx="16"/>
    </clipPath>
  </defs>

  <rect width="1280" height="640" fill="url(#background)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <circle cx="1164" cy="-52" r="282" fill="#2bc7f3" fill-opacity="0.12"/>
  <circle cx="1268" cy="38" r="206" fill="#176bff" fill-opacity="0.12"/>
  <path d="M0 608C180 566 318 578 472 620H0Z" fill="url(#accent)" fill-opacity="0.1"/>

  <image href="../../.agents/skills/argus/assets/brand/argus-logo-color.png" x="64" y="48" width="244" height="68" preserveAspectRatio="xMinYMid meet"/>

  <g font-family="Inter, SF Pro Display, Helvetica Neue, Arial, sans-serif">
    <text x="64" y="158" fill="#55708c" font-size="15" font-weight="760" letter-spacing="2.1">REALSEE SKILLS · ARGUS</text>
    <text x="64" y="224" fill="#09182b" font-size="58" font-weight="760" letter-spacing="-2.3">A World-Leading</text>
    <text x="64" y="294" fill="#176bff" font-size="70" font-weight="780" letter-spacing="-2.8">3D Vision</text>
    <text x="64" y="356" fill="#09182b" font-size="56" font-weight="760" letter-spacing="-2.2">Foundation Model</text>

    <text x="66" y="412" fill="#35536f" font-size="24" font-weight="650">Metric 3D structure in milliseconds</text>
    <text x="66" y="449" fill="#607890" font-size="18" font-weight="560">Pose · Depth · Point Clouds · Renderable Geometry</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="680" y="48" width="548" height="422" rx="28" fill="#ffffff"/>

    <circle cx="704" cy="82" r="6" fill="#1677ff"/>
    <text x="720" y="89" fill="#173453" font-family="Inter, SF Pro Text, Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="740" letter-spacing="0.35">METRIC PANORAMIC 3D RECONSTRUCTION</text>
    <g clip-path="url(#researchClip)">
      <image href="../../.agents/skills/argus/assets/brand/argus-paper-teaser.png" x="704" y="104" width="500" height="175" preserveAspectRatio="xMidYMid slice"/>
    </g>
    <rect x="704.5" y="104.5" width="499" height="174" rx="15.5" fill="none" stroke="#c6def4"/>

    <circle cx="704" cy="302" r="6" fill="#2bc7f3"/>
    <text x="720" y="309" fill="#173453" font-family="Inter, SF Pro Text, Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="740" letter-spacing="0.35">AGENT-READY SKILL WORKFLOW</text>
    <g clip-path="url(#workflowClip)">
      <rect x="704" y="320" width="500" height="134" fill="#f5faff"/>
      <path d="M744 387H1158" fill="none" stroke="#b8d7f3" stroke-width="4" stroke-linecap="round"/>
      <g font-family="Inter, SF Pro Text, Helvetica Neue, Arial, sans-serif" font-weight="740">
        <circle cx="760" cy="387" r="20" fill="#176bff"/>
        <text x="760" y="392" text-anchor="middle" fill="#ffffff" font-size="14">IN</text>
        <text x="724" y="434" fill="#173453" font-size="13" letter-spacing="0.5">PANORAMAS</text>
        <circle cx="894" cy="387" r="20" fill="#11bdf4"/>
        <text x="894" y="392" text-anchor="middle" fill="#ffffff" font-size="14">ZIP</text>
        <text x="865" y="434" fill="#173453" font-size="13" letter-spacing="0.5">PACKAGE</text>
        <circle cx="1028" cy="387" r="20" fill="#176bff"/>
        <text x="1028" y="392" text-anchor="middle" fill="#ffffff" font-size="14">AI</text>
        <text x="1004" y="434" fill="#173453" font-size="13" letter-spacing="0.5">ARGUS</text>
        <circle cx="1162" cy="387" r="20" fill="#2258e8"/>
        <text x="1162" y="392" text-anchor="middle" fill="#ffffff" font-size="14">3D</text>
        <text x="1132" y="434" fill="#173453" font-size="13" letter-spacing="0.5">OUTPUTS</text>
      </g>
    </g>
    <rect x="704.5" y="320.5" width="499" height="133" rx="15.5" fill="none" stroke="#c6def4"/>
    <rect x="680.5" y="48.5" width="547" height="421" rx="27.5" fill="none" stroke="#ffffff" stroke-opacity="0.92"/>
  </g>

  <g font-family="Inter, SF Pro Display, Helvetica Neue, Arial, sans-serif">
    <g transform="translate(64 494)">
      <rect width="276" height="110" rx="18" fill="#ffffff" stroke="#cfe2f5"/>
      <text x="22" y="48" fill="#176bff" font-size="24" font-weight="780" letter-spacing="-0.3">LOCAL PANORAMAS</text>
      <text x="22" y="76" fill="#173453" font-size="14" font-weight="750" letter-spacing="1.1">INPUT PACKAGE</text>
      <text x="22" y="96" fill="#70879d" font-size="12" font-weight="600">VERIFIED BEFORE UPLOAD</text>
    </g>
    <g transform="translate(356 494)">
      <rect width="276" height="110" rx="18" fill="#ffffff" stroke="#cfe2f5"/>
      <text x="22" y="48" fill="#176bff" font-size="24" font-weight="780" letter-spacing="-0.3">DEPTH MAPS</text>
      <text x="22" y="76" fill="#173453" font-size="14" font-weight="750" letter-spacing="1.0">EXR OUTPUTS</text>
      <text x="22" y="96" fill="#70879d" font-size="12" font-weight="600">VALIDATED RESULT INDEX</text>
    </g>
    <g transform="translate(648 494)">
      <rect width="276" height="110" rx="18" fill="#ffffff" stroke="#cfe2f5"/>
      <text x="22" y="48" fill="#176bff" font-size="24" font-weight="780" letter-spacing="-0.3">CAMERA POSES</text>
      <text x="22" y="76" fill="#173453" font-size="14" font-weight="750" letter-spacing="1.1">PER IMAGE</text>
      <text x="22" y="96" fill="#70879d" font-size="12" font-weight="600">OPTIONAL INTRINSICS</text>
    </g>
    <g transform="translate(940 494)">
      <rect width="276" height="110" rx="18" fill="#ffffff" stroke="#cfe2f5"/>
      <text x="22" y="48" fill="#176bff" font-size="24" font-weight="780" letter-spacing="-0.3">MERGED GLB</text>
      <text x="22" y="76" fill="#173453" font-size="14" font-weight="750" letter-spacing="1.0">POINT CLOUD</text>
      <text x="22" y="96" fill="#70879d" font-size="12" font-weight="600">READY FOR INSPECTION</text>
    </g>
  </g>

  <rect y="630" width="1280" height="10" fill="url(#accent)"/>
</svg>
